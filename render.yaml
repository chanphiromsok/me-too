services:
  - type: web
    name: pos-testing-api
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: /app/bin/server
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pos-testing-db
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: TOKEN_SIGNING_SECRET
        generateValue: true
      - key: PHX_SCHEME
        value: https
      - key: PHX_URL_PORT
        value: "443"
      - key: POOL_SIZE
        value: "5"
      - key: RELEASE_DISTRIBUTION
        value: none

databases:
  - name: pos-testing-db
    databaseName: pos_testing
    user: pos_testing
    plan: free
    region: singapore
    postgresMajorVersion: "17"
    ipAllowList: []

previews:
  generation: "off"
